---

# Сбор информации о серверах. Роль server_info — это набор метрик,
# по одному файлу на метрику: roles/server_info/tasks/<metric>.yml
#   os, dns, firewall, ...
#
# За один запуск выполняется ОДНА метрика.
#
# Extra Variables в Semaphore:
#   target — all | имя группы | hostname   
#   metric — имя файла метрики без .yml     
#
# Пример: target=web_servers metric=dns  → выполнит dns.yml на web_servers.

- name: Collect server info
  hosts: "{{ target }}"
  gather_facts: true
  become: false
  roles:
    - server_info
