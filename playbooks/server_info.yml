---

# Сбор информации о серверах. Роль server_info разбита на разделы (теги):
#   os, dns, firewall
#
# Запуск всех разделов:   без --tags
# Только нужные разделы:   --tags dns        / --tags os,firewall
#
# target в Extra Variables: all | имя группы | hostname (по умолчанию all)

- name: Collect server info
  hosts: "{{ target | default('all') }}"
  gather_facts: true
  become: false
  roles:
    - server_info
