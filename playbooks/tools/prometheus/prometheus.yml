---

- name: Deploy Prometheus
  hosts: home-lab
  gather_facts: true
  ignore_unreachable: true
  become: true
  vars:
    # ВАЖНО! 
    # Если менять переменные, то нужно проверить конфиг и службу
    # Есе захардкожено потому что в шаблонах нет yml highlite! Это моя вкусовщина!
    #
    # hardcoded -----
    prom_url: "http://10.10.30.165:9004/EXPOFORUM/s3/raw/branch/main/prometheus"
    prom_path: "/opt/prometheus"
    port: "9090"
    service_file_path: "/etc/systemd/system/prometheus.service"

    # softcoded ------
    bin_path: "{{ prom_path }}/prometheus"
    config_path: "{{ prom_path }}/prometheus.yml"
    data_path: "{{ prom_path }}/data"
    rules_path: "{{ prom_path }}/rules"
    
    
  tasks:
    # ── Создание директорий ──────────────────────────────────────────────

    - name: Create prometheus directories
      file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ prom_path }}"
        - "{{ data_path }}"
        - "{{ rules_path }}"

    # ── Проверка текущего состояния ──────────────────────────────────────

    - name: Check if service already exists
      stat:
        path: "{{ service_file_path }}"
      register: service_file

    - name: Fail if port is already in use (first run only)
      wait_for:
        host: localhost
        port: "{{ port }}"
        state: stopped
        timeout: 3
      when: not service_file.stat.exists

    # ── Загрузка бинарника ───────────────────────────────────────────────

    - name: Download prometheus binary
      get_url:
        url: "{{ prom_url }}"
        dest: "{{ bin_path }}"
        mode: "0755"
        force: yes
      register: binary_changed

    # ── Деплой конфига ───────────────────────────────────────────────────

    - name: Deploy prometheus config
      copy:
        src: files/prometheus.config.yml
        dest: "{{ config_path }}"
        mode: "0644"
      register: config_changed

    - name: Deploy rules files
      copy:
        src: files/{{ item }}
        dest: "{{ rules_path }}/{{ item }}"
        mode: "0644"
      loop:
        - disk.yml
      register: rules_changed

    # ── Первый запуск: создание и старт сервиса ──────────────────────────

    - name: Deploy systemd service file
      copy:
        src: files/prometheus.service
        dest: "{{ service_file_path }}"
      when: not service_file.stat.exists

    - name: Reload systemd daemon
      systemd:
        daemon_reload: yes
      when: not service_file.stat.exists

    - name: Enable and start service (first run)
      systemd:
        name: prometheus
        state: started
        enabled: yes
      when: not service_file.stat.exists

    # ── Обновление ───────────────────────────────────────────────────────

    - name: Restart service (binary updated)
      systemd:
        name: prometheus
        state: restarted
      when: service_file.stat.exists and binary_changed.changed

    - name: Hot-reload config (config only, no restart needed)
      uri:
        url: "http://localhost:{{ port }}/-/reload"
        method: POST
        status_code: 200
      when: service_file.stat.exists and not binary_changed.changed and (config_changed.changed or rules_changed.changed)

    # ── Проверка работоспособности ───────────────────────────────────────

    - name: Wait for prometheus to come up
      wait_for:
        host: localhost
        port: "{{ port }}"
        state: started
        timeout: 15

    - name: Health check
      uri:
        url: "http://localhost:{{ port }}/-/healthy"
        status_code: 200
      retries: 3
      delay: 2
