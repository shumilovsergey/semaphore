- name: Setup server_3
  hosts: server_3
  become: true
  vars:
    nftables_ports:
      - 22
      - 80
      - 443
      - 5432
    nginx_server_name: admin.example.com
    nginx_proxy_pass: http://localhost:4000
    prometheus_version: "2.52.0"
  tasks:
    - include_tasks: roles/nftables.yml
    - include_tasks: roles/nginx.yml
    - include_tasks: roles/prometheus.yml

