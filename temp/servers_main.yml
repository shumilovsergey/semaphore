- name: Common setup for all servers
  hosts: all
  become: true
  vars:
    dns_servers:
      - "192.168.1.1"
      - "192.168.1.2"
    dns_fallback:
      - "1.1.1.1"
      - "8.8.8.8"
    dns_search: "internal.example.com"
    node_exporter_version: "1.8.1"
    node_exporter_port: 9100
  tasks:
    - include_tasks: roles/dns.yml
    - include_tasks: roles/node_exporter.yml
