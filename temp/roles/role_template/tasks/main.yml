- name: Example task
  ansible.builtin.package:
    name: "{{ package_name }}"     # дефолт в defaults/main.yml
    state: present

- name: Deploy config
  ansible.builtin.template:
    src: config.j2
    dest: "{{ config_dest }}"      # дефолт в defaults/main.yml
    mode: "0644"
  notify: Reload service           # имя должно совпадать с handlers/main.yml
