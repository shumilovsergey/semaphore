---
# Drop-in file — survives package upgrades, easy to audit, idempotent.
# Main config (/etc/systemd/resolved.conf) is left untouched.

- name: Create resolved.conf.d directory
  file:
    path: /etc/systemd/resolved.conf.d
    state: directory
    mode: "0755"

- name: Deploy DNS drop-in config
  copy:
    dest: /etc/systemd/resolved.conf.d/dns.conf
    content: |
      [Resolve]
      DNS={{ dns_servers | join(' ') }}
      {% if dns_domain %}
      Domains={{ dns_domain }}
      {% endif %}
    mode: "0644"
  notify: Restart systemd-resolved

- name: Ensure /etc/resolv.conf points to stub resolver
  file:
    src: /run/systemd/resolve/stub-resolv.conf
    dest: /etc/resolv.conf
    state: link
    force: yes
