---

# Управление DNS через systemd-resolved
# Применяется на: Ubuntu 22/24, Debian 12/13, Astra 1.8

- name: Развернуть resolved.conf
  copy:
    dest: /etc/systemd/resolved.conf
    content: |
      [Resolve]
      DNS={{ dns_servers | join(' ') }}
      FallbackDNS={{ dns_fallback | join(' ') }}
      Domains={{ dns_search | default('') }}
    mode: "0644"
  notify: restart systemd-resolved

# resolv.conf должен быть симлинком на stub-резолвер systemd
# иначе приложения будут обходить systemd-resolved
- name: Убедиться что /etc/resolv.conf — симлинк на stub-резолвер
  file:
    src: /run/systemd/resolve/stub-resolv.conf
    dest: /etc/resolv.conf
    state: link
    force: yes

- name: Перезапустить systemd-resolved
  systemd:
    name: systemd-resolved
    state: restarted
  listen: restart systemd-resolved
