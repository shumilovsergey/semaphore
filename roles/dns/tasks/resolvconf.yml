---

# Управление DNS через утилиту resolvconf
# Применяется на: Debian 11, старые Ubuntu

- name: Убедиться что resolvconf установлен
  package:
    name: resolvconf
    state: present

# Пишем в head — он вставляется в начало итогового resolv.conf
# и имеет приоритет над записями от DHCP
- name: Записать DNS-серверы в head-файл resolvconf
  copy:
    dest: /etc/resolvconf/resolv.conf.d/head
    content: |
      {% for srv in dns_servers %}
      nameserver {{ srv }}
      {% endfor %}
      {% if dns_search is defined and dns_search %}
      search {{ dns_search }}
      {% endif %}
    mode: "0644"
  notify: update resolvconf

- name: Обновить resolvconf
  command: resolvconf -u
  listen: update resolvconf
