---

# Управление DNS через прямую запись в /etc/resolv.conf
# Используется как fallback если не найден ни один менеджер DNS
# Внимание: DHCP может перезаписать файл после перезапуска сети

- name: Записать /etc/resolv.conf напрямую
  copy:
    dest: /etc/resolv.conf
    content: |
      {% for srv in dns_servers %}
      nameserver {{ srv }}
      {% endfor %}
      {% if dns_search is defined and dns_search %}
      search {{ dns_search }}
      {% endif %}
    mode: "0644"
