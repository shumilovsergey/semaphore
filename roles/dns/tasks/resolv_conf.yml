---
# Direct /etc/resolv.conf write — no manager daemon in the way.
# Risk: DHCP client may overwrite on network restart. Protect with
# chattr +i after this task if that is a concern on the target host.

- name: Write /etc/resolv.conf
  copy:
    dest: /etc/resolv.conf
    content: |
      {% for srv in dns_servers %}
      nameserver {{ srv }}
      {% endfor %}
      {% if dns_domain %}
      search {{ dns_domain }}
      {% endif %}
    mode: "0644"
