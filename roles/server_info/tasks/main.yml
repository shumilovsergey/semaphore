- name: server_info | metric must be set
  assert:
    that:
      - metric is defined
      - metric | length > 0
    fail_msg: >-
      Не задан metric. Передай его в Extra Variables, например metric=dns.
      Доступные метрики — файлы в roles/server_info/tasks/ (os, dns, firewall, ...).

- name: server_info | run metric "{{ metric }}"
  include_tasks: "{{ metric }}.yml"
