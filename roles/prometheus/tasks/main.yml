- name: Create prometheus directories
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ prom_path }}"
    - "{{ data_path }}"
    - "{{ rules_path }}"

- name: Check if service already exists
  stat:
    path: "{{ service_file_path }}"
  register: service_file

- name: Fail if port is already in use (first run only)
  wait_for:
    host: localhost
    port: "{{ prometheus_port }}"
    state: stopped
    timeout: 3
  when: not service_file.stat.exists

- name: Download prometheus binary
  get_url:
    url: "{{ prom_url }}"
    dest: "{{ bin_path }}"
    mode: "0755"
    force: yes
  notify: Restart prometheus

- name: Deploy prometheus config
  copy:
    src: prometheus.config.yml
    dest: "{{ config_path }}"
    mode: "0644"
  notify: Reload prometheus config

- name: Deploy rules files
  copy:
    src: "{{ item }}"
    dest: "{{ rules_path }}/{{ item }}"
    mode: "0644"
  loop:
    - disk.yml
  notify: Reload prometheus config

- name: Set ownership on prometheus directory
  file:
    path: "{{ prom_path }}"
    state: directory
    owner: "{{ service_user }}"
    group: "{{ service_user }}"
    recurse: yes

- name: Deploy systemd service file
  template:
    src: prometheus.service.j2
    dest: "{{ service_file_path }}"
    mode: "0644"
  register: service_file_deployed
  notify: Restart prometheus

- name: Reload systemd daemon
  systemd:
    daemon_reload: yes
  when: service_file_deployed.changed

- name: Enable and start service (first run)
  systemd:
    name: prometheus
    state: started
    enabled: yes
  when: not service_file.stat.exists

- name: Wait for prometheus to come up
  wait_for:
    host: localhost
    port: "{{ prometheus_port }}"
    state: started
    timeout: 15

- name: Health check
  uri:
    url: "http://localhost:{{ prometheus_port }}/-/healthy"
    status_code: 200
  retries: 3
  delay: 2
