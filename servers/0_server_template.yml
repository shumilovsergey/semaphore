---

# Скопируй этот файл, переименуй в <hostname>.yml
# Имя файла должно совпадать с именем хоста в inventory.
#
# Это файл ДАННЫХ для servers/run.yml, а не отдельный плейбук.

# идеи на будущее
# для каждого сервера создавать список админов, которым можно туда ходить

# Роли для этого сервера — выполняются по порядку.
# preflight запускается автоматически и первым, тут его указывать не нужно.
server_roles: []
# Пример:
# server_roles:
#   - node_exporter
#   - prometheus

# Переменные ролей — перебивают defaults роли
# node_exporter_url: ""
# prom_url: ""
